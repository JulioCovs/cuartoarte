kind = "mobile"
previewPath = "/"
title = "Cuarto Arte"
version = "1.0.0"
id = "artifacts/cuarto-arte"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19177

[services.development]
run = "pnpm --filter @workspace/cuarto-arte run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cuarto-arte", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cuarto-arte", "run", "serve" ]

[services.env]
PORT = "19177"
BASE_PATH = "/"
